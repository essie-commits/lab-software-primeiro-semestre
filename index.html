<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Eva</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <form id="login">

        <fieldset id="login_field">

            <h2 id="titulo">Login</h2>
            <h3 id="subtitulo">Olha quem voltou!</h3>


            <label for="login_email">Email</label>

            <div class="container_input" id="cnt_login_email">

                <input 
                type="email" 
                name="email" 
                id="login_email" 
                maxlength="300" 
                placeholder="exemplo@dominio.com"
                required>

            </div>
            
            <label for="login_senha">Senha</label>

            <div id="cnt_login_senha">
                <input 
                type="password" 
                name="senha" 
                id="login_senha" 
                minlength="6" 
                maxlength="300"
                placeholder="Digite sua senha"
                required>
                <button type="button" name="mostrar" id="login_mostrar">Mostrar</button>
            </div>

<div id="cnt_login_inf">

            <button type="submit" name="entrar" id="login_entrar">Entrar</button>
            
            <p>Ainda não tem uma conta? <a href="novousuario.html">Cadastre-se</a></p>

</div>

        </fieldset>

    </form>

    <script src="login.js" type="module"></script>
    
</body>
</html>
